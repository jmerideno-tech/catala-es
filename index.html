<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aprende Catalán 🔴🟡</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#a50034;--nav:#7a0026;
  --acc:#ffcc00;--acc-d:#c9a000;
  --btn:#ff6b35;--btn-d:#d4531f;
  --green:#58cc02;--gd:#46a302;--gl:#d7ffb8;
  --red:#ff4b4b;--rl:#ffdfe0;
  --yel:#ffc800;--mut:#afafaf;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:var(--bg);min-height:100vh;}
/* ── TOPBAR ── */
.topbar{width:100%;background:var(--nav);display:flex;align-items:center;gap:10px;padding:11px 18px;position:sticky;top:0;z-index:100;border-bottom:3px solid rgba(255,255,255,.1)}
.flag{font-size:1.5rem}.lname{color:rgba(255,255,255,.65);font-weight:800;font-size:.75rem;letter-spacing:1px;flex-shrink:0}
.pw{flex:1;height:13px;background:rgba(255,255,255,.2);border-radius:999px;overflow:hidden}
.pb{height:100%;background:var(--acc);border-radius:999px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.hts{display:flex;gap:3px;font-size:1.1rem;flex-shrink:0}
.xpb{background:var(--acc);color:rgba(0,0,0,.7);font-weight:900;font-size:.75rem;padding:3px 9px;border-radius:999px;flex-shrink:0}
/* ── LAYOUT ── */
.page{max-width:680px;margin:0 auto;padding:20px 14px 60px}
.card{background:#fff;border-radius:22px;padding:26px 22px;box-shadow:0 8px 40px rgba(0,0,0,.3);animation:su .35s ease;margin-bottom:16px}
@keyframes su{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
/* ── HOME ── */
.slbl{color:rgba(255,255,255,.5);font-size:.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.llist{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.lbtn{background:#fff;border-radius:18px;padding:14px 18px;display:flex;align-items:center;gap:13px;cursor:pointer;border:3px solid transparent;transition:all .2s;box-shadow:0 6px 0 rgba(0,0,0,.3);outline:none;width:100%;text-align:left}
.lbtn:hover{transform:translateY(-3px);box-shadow:0 9px 0 rgba(0,0,0,.3)}
.lbtn.done{border-color:var(--acc)}
.lbtn.locked{opacity:.4;pointer-events:none;filter:grayscale(.9)}
.li{font-size:2.2rem;width:48px;text-align:center;flex-shrink:0}
.linf{flex:1;min-width:0}
.lt{font-family:'Pacifico',sans-serif;font-size:1.15rem;color:var(--bg);line-height:1.2}
.ls{font-size:.78rem;color:var(--mut);margin-top:2px}
.lstar{color:var(--yel);font-size:.9rem;margin-top:3px}
.lbtns{display:flex;gap:8px;margin-top:8px}
.go-ex{flex:1;padding:9px;background:var(--acc);color:rgba(0,0,0,.7);border:none;border-radius:10px;font-family:'Quicksand',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 3px 0 var(--acc-d);transition:all .12s;outline:none}
.go-ex:active{transform:translateY(3px);box-shadow:none}
.go-games{flex:1;padding:9px;background:var(--btn);color:#fff;border:none;border-radius:10px;font-family:'Quicksand',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 3px 0 var(--btn-d);transition:all .12s;outline:none}
.go-games:active{transform:translateY(3px);box-shadow:none}
/* ── EXERCISE ── */
.lhdr{text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #f0f0f0}
.lhi{font-size:2.8rem;margin-bottom:5px}
.lht{font-family:'Pacifico',sans-serif;font-size:1.5rem;color:var(--bg)}
.lhs{font-size:.82rem;color:var(--mut);margin-top:3px}
.exb{display:inline-block;background:rgba(0,0,0,.06);color:var(--bg);font-weight:800;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;padding:3px 11px;border-radius:999px;margin-bottom:11px}
.q{font-size:1.1rem;font-weight:800;color:#3c3c3c;margin-bottom:16px;line-height:1.45}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.opt{background:#fff;border:2.5px solid #e5e5e5;border-radius:var(--r);padding:12px 14px;font-family:'Quicksand',sans-serif;font-size:.92rem;font-weight:700;color:#3c3c3c;cursor:pointer;transition:all .12s;text-align:left;box-shadow:0 4px 0 #e5e5e5;outline:none}
.opt:hover:not(:disabled){background:#f7f7f7;border-color:#bbb;transform:translateY(-1px)}
.opt.correct{background:var(--gl)!important;border-color:var(--green)!important;color:var(--gd)!important;box-shadow:0 4px 0 var(--gd)!important}
.opt.wrong{background:var(--rl)!important;border-color:var(--red)!important;color:var(--red)!important;animation:shake .3s}
.opt.dim{opacity:.38;pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.lisbtn{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--btn);color:#fff;border:none;border-radius:var(--r);padding:13px 24px;font-family:'Quicksand',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;box-shadow:0 4px 0 var(--btn-d);transition:all .12s;margin:0 auto 16px}
.lisbtn:active{transform:translateY(4px);box-shadow:none}
.fw{font-size:1.15rem;font-weight:800;color:#3c3c3c;margin-bottom:13px;line-height:2}
.blank{border:none;border-bottom:3px solid var(--btn);background:transparent;font-size:1.15rem;font-weight:800;font-family:'Quicksand',sans-serif;color:var(--bg);width:105px;text-align:center;outline:none;padding:2px}
.blank.correct{border-color:var(--green);color:var(--gd)}
.blank.wrong{border-color:var(--red);color:var(--red);animation:shake .3s}
.wdrop{min-height:50px;border-bottom:3px solid #ccc;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end;padding-bottom:7px;margin-bottom:12px}
.wbank{display:flex;flex-wrap:wrap;gap:6px;background:#f7f7f7;border-radius:11px;padding:9px;min-height:46px;margin-bottom:12px}
.chip{background:#fff;border:2px solid #e0e0e0;border-radius:9px;padding:6px 12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;transition:all .12s;box-shadow:0 2px 0 #e0e0e0;font-size:.88rem;outline:none}
.chip:hover:not(.ghost){border-color:#bbb;transform:translateY(-2px)}
.chip.placed{background:var(--btn);color:#fff;border-color:var(--btn-d);box-shadow:0 2px 0 var(--btn-d)}
.chip.ghost{opacity:.22;pointer-events:none}
.mwrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mcol{display:flex;flex-direction:column;gap:6px}
.mbtn{background:#fff;border:2px solid #e5e5e5;border-radius:11px;padding:10px 12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;transition:all .12s;box-shadow:0 3px 0 #e5e5e5;text-align:center;font-size:.88rem;outline:none}
.mbtn:hover{border-color:#bbb}
.mbtn.sel{background:#e8f4fd;border-color:var(--btn);color:var(--bg)}
.mbtn.hit{background:var(--gl);border-color:var(--green);color:var(--gd);pointer-events:none}
.mbtn.miss{background:var(--rl);border-color:var(--red);animation:shake .3s}
.fb{border-radius:13px;padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;gap:9px;font-weight:800;font-size:.92rem}
.fb.ok{background:var(--gl);color:var(--gd);border:2px solid var(--green)}
.fb.ko{background:var(--rl);color:var(--red);border:2px solid var(--red)}
.fbi{font-size:1.5rem}
.fbh{font-weight:600;font-size:.8rem;margin-top:2px}
.conbtn{width:100%;padding:14px;background:var(--acc);color:rgba(0,0,0,.75);border:none;border-radius:var(--r);font-family:'Quicksand',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;box-shadow:0 4px 0 var(--acc-d);transition:all .12s;outline:none}
.conbtn:active{transform:translateY(4px);box-shadow:none}
.chkbtn{width:100%;padding:14px;background:var(--btn);color:#fff;border:none;border-radius:var(--r);font-family:'Quicksand',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;box-shadow:0 4px 0 var(--btn-d);transition:all .12s;outline:none}
.chkbtn:active{transform:translateY(4px);box-shadow:none}
/* ── COMPLETE ── */
.comp{text-align:center;padding:34px 18px}
.troph{font-size:4.5rem;display:block;margin-bottom:12px;animation:bo 1s ease-in-out infinite alternate}
@keyframes bo{from{transform:translateY(0)}to{transform:translateY(-13px)}}
.ctit{font-family:'Pacifico',sans-serif;font-size:2rem;color:var(--bg);margin-bottom:5px}
.stats{display:flex;justify-content:center;gap:14px;margin:16px 0;flex-wrap:wrap}
.stat{background:#f7f7f7;border-radius:13px;padding:11px 16px;text-align:center}
.sv{font-family:'Pacifico',sans-serif;font-size:1.7rem;color:var(--bg)}
.sl{font-size:.68rem;color:var(--mut);font-weight:700;text-transform:uppercase;margin-top:2px}
/* ── GAMES MENU ── */
.games-menu{display:flex;flex-direction:column;gap:14px}
.game-card{background:#fff;border-radius:18px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;border:3px solid transparent;transition:all .2s;box-shadow:0 6px 0 rgba(0,0,0,.25);outline:none;width:100%;text-align:left}
.game-card:hover{transform:translateY(-3px);box-shadow:0 9px 0 rgba(0,0,0,.25);border-color:var(--acc)}
.game-card .gc-icon{font-size:3rem;flex-shrink:0}
.game-card .gc-info .gc-title{font-family:'Pacifico',sans-serif;font-size:1.2rem;color:var(--bg)}
.game-card .gc-info .gc-sub{font-size:.82rem;color:var(--mut);margin-top:4px}
/* ── WORD SEARCH ── */
.ws-container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.ws-grid-wrap{overflow-x:auto}
.ws-grid{display:grid;border:2px solid #e0e0e0;border-radius:10px;overflow:hidden;background:#f8f8f8}
.ws-cell{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;border:1px solid #eee;transition:all .1s;background:#fff;color:#333;font-family:'Quicksand',sans-serif;user-select:none}
.ws-cell:hover{background:#e8f4fd}
.ws-cell.selecting{background:#AED6F1;color:var(--bg)}
.ws-cell.found{background:var(--gl);color:var(--gd)}
.ws-cell.found-alt{background:#FFE5B4;color:#C9782A}
.ws-wordlist{min-width:160px}
.ws-wordlist h3{font-family:'Pacifico',sans-serif;font-size:1rem;color:var(--bg);margin-bottom:10px}
.ws-word{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;font-size:.88rem;font-weight:700;background:#f7f7f7;transition:all .2s}
.ws-word .wcat{color:var(--bg);font-size:.95rem}
.ws-word .wnative{color:var(--mut);font-size:.8rem}
.ws-word.hit{background:var(--gl);color:var(--gd)}
.ws-word.hit .wcat,.ws-word.hit .wnative{color:var(--gd)}
.ws-found-count{text-align:center;font-family:'Pacifico',sans-serif;font-size:1.1rem;color:var(--bg);margin:12px 0}
/* ── 7 DIFERÈNCIES ── */
.diff-container{display:flex;flex-direction:column;gap:16px}
.diff-images{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.diff-img-wrap{position:relative;flex:1;min-width:280px}
.diff-img-wrap svg{display:block;cursor:crosshair}
.diff-label{text-align:center;font-weight:800;font-size:.8rem;color:var(--bg);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.diff-click-indicator{position:absolute;pointer-events:none;border-radius:50%;border:3px solid;animation:diffpop .6s ease forwards}
@keyframes diffpop{0%{transform:scale(0);opacity:1}100%{transform:scale(1);opacity:0}}
.diff-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.diff-item{background:#f7f7f7;border:2px solid #e0e0e0;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:700;color:var(--mut);transition:all .2s;display:flex;align-items:center;gap:6px}
.diff-item.found{background:var(--gl);border-color:var(--green);color:var(--gd)}
.diff-count{text-align:center;font-family:'Pacifico',sans-serif;font-size:1.3rem;color:var(--bg);margin:8px 0}
/* ── BACK BTN ── */
.backbtn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border:2px solid rgba(255,255,255,.3);border-radius:999px;padding:8px 16px;font-family:'Quicksand',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;transition:all .15s;margin-bottom:14px;outline:none}
.backbtn:hover{background:rgba(255,255,255,.25)}
@media(max-width:520px){
  .opts{grid-template-columns:1fr}
  .card{padding:18px 14px}
  .diff-images{flex-direction:column}
  .ws-cell{width:26px;height:26px;font-size:12px}
}
</style>
</head>
<body>

  <span class="flag">🌎</span>
  <span class="lname">Español</span>

</div>
<div class="page" id="app"></div>

function speak(t,l){

function upBar(){
  const tot=LESS.reduce((a,l)=>a+l.exercises.length,0);

  $('pb').style.width=(dn/tot*100)+'%';
  let h='';for(let i=0;i<3;i++)h+=i<S.lives?'❤️':'🖤';
  $('hts').innerHTML=h;$('xpb').textContent=S.xp+' XP';
}

// WORD SEARCH
// ═══════════════════════════════════════
function rWordSearch(){
  const ws = GDL().wordsearch;
  const grid = ws.grid;
  const size = ws.size;
  const words = ws.words;
 
  // Colors per paraula trobada
  const COLORS = ['found','found-alt','found','found-alt','found','found-alt','found','found-alt'];
 
  // Calcula quines cel·les estan trobades
  const foundCells = {};
  S.wsFound.forEach((fw,fi) => {
    const pl = ws.placements.find(p=>p.word===fw);
    if(!pl) return;
    const colorCls = COLORS[fi % COLORS.length];
    for(let i=0;i<fw.length;i++) {
      foundCells[`${pl.r+pl.dr*i}-${pl.c+pl.dc*i}`] = colorCls;
    }
  });
 
  let gridHtml = `<div class="ws-grid" style="grid-template-columns:repeat(${size},30px)">`;
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) {
    const key=`${r}-${c}`;
    const fc=foundCells[key]||'';
    const sel=S.wsSelecting.some(x=>x.r===r&&x.c===c)?'selecting':'';
    gridHtml += `<div class="ws-cell ${fc||sel}" data-r="${r}" data-c="${c}">${grid[r][c]}</div>`;
  }
  gridHtml += '</div>';
 
  let wordListHtml = `<div class="ws-wordlist"><h3>${GL.wordlist}</h3>`;
  words.forEach(w => {
    const hit = S.wsFound.includes(w.key);
    wordListHtml += `<div class="ws-word ${hit?'hit':''}">
      <span class="wcat">${hit?'✓ ':''}${w.cat}</span>
      <span class="wnative">${w.native}</span>
    </div>`;
  });
  wordListHtml += '</div>';
 
  const allFound = S.wsFound.length >= words.length;
 
  return `
  <button class="backbtn" id="backGames">← ${GL.back_lesson}</button>
  <div class="card">
    <div class="lhdr">
      <div class="lhi">🔍</div>
      <div class="lht">${GL.wordsearch}</div>
      <div class="lhs">${L().title} — ${GL.findwords}</div>
    </div>
    <div class="ws-found-count">${S.wsFound.length} / ${words.length} ${GL.found}</div>
    ${allFound?`<div style="text-align:center;font-size:2rem;margin-bottom:12px">🎉</div><div style="text-align:center;font-family:$'Pacifico',sans-serif;font-size:1.3rem;color:var(--bg);margin-bottom:16px">${GL.solved}</div>`:''}
    <div class="ws-container">
      <div class="ws-grid-wrap">${gridHtml}</div>
      ${wordListHtml}
    </div>
    <div style="margin-top:14px;display:flex;gap:10px">
      <button class="chkbtn" id="wsReset" style="flex:1">${GL.reset}</button>
    </div>
  </div>`;
}

function rDifferences(){
  const df = GDL().differences;

  let diffListHtml = '<div class="diff-list">';
  df.diffs.forEach((d,i) => {

  return `

    <div class="lhdr">

      <div class="lhs">${L().title} — ${GL.finddiffs}</div>

          <div class="diff-label">A</div>
          ${df.svgA}
        </div>
        <div class="diff-img-wrap" id="imgB">
          <div class="diff-label">B</div>
          ${df.svgB}
        </div>
      </div>
      ${diffListHtml}
      <button class="chkbtn" id="diffReset">${GL.reset}</button>
    </div>

}

function rEx(){
  const l=L(),e=E();
  let inn='';
  if(e.type==='translate')inn=rTr(e);
  else if(e.type==='listen')inn=rLis(e);
  else if(e.type==='fill')inn=rFill(e);
  else if(e.type==='order')inn=rOrd(e);
  else if(e.type==='match')inn=rMatch(e);
  const f=S.fb;
  const fh=f?`<div class="fb ${f.ok?'ok':'ko'}"><span class="fbi">${f.ok?'🎉':'💔'}</span><div><div>${f.ok?UI.correct:UI.wrong}</div>${!f.ok?`<div class="fbh">${UI.ca} <strong>${f.ans}</strong></div>`:''}</div></div>`:'';
  return `<button class="backbtn" id="backHome2">← ${UI.back||'←'}</button>
  <div class="card"><div class="lhdr"><div class="lhi">${l.icon}</div><div class="lht">${l.title}</div>
  <div class="lhs">${l.titleNative} · ${S.ei+1}/${l.exercises.length}</div></div>
  <div class="exb">${UI[e.type]||e.type}</div>${inn}${fh}
  ${f?`<button class="conbtn" id="cb">${UI.continue}</button>`:''}
  </div>`;
}
function rTr(e){return`<div class="q">${e.q}</div><div class="opts">${e.options.map((o,i)=>{let c='';if(S.fb)c=i===e.correct?'correct':(S.fb.chosen===i?'wrong':'dim');return`<button class="opt ${c}" data-oi="${i}">${o}</button>`;}).join('')}</div>`;}
function rLis(e){return`<div class="q">${UI.listen}</div><button class="lisbtn" id="lb">${UI.listen}</button><div class="opts">${e.options.map((o,i)=>{let c='';if(S.fb)c=i===e.correct?'correct':(S.fb.chosen===i?'wrong':'dim');return`<button class="opt ${c}" data-oi="${i}">${o}</button>`;}).join('')}</div>`;}
function rFill(e){const p=e.sentence.split('___');const c=S.fb?(S.fb.ok?'correct':'wrong'):'';return`<div class="q">${e.hint}</div><div class="fw">${p[0]}<input class="blank ${c}" value="${S.fb?e.blank:''}" placeholder="..." ${S.fb?'disabled':''}>${p[1]||''}</div><div class="opts">${e.options.map(o=>{let c='';if(S.fb)c=o===e.blank?'correct':(S.fb.chosen===o&&o!==e.blank?'wrong':'dim');return`<button class="opt ${c}" data-fw="${o}">${o}</button>`;}).join('')}</div>`;}
function rOrd(e){const a=S.wa,nat=e.native||'';return`<div class="q">${UI.order||'Order'}: <em style="color:#888;font-weight:600">${nat}</em></div><div class="wdrop" id="wd">${a.map((w,i)=>`<button class="chip placed" data-di="${i}">${w}</button>`).join('')}</div><div class="wbank" id="wb">${e.words.map((w,i)=>`<button class="chip ${a.includes(w)?'ghost':''}" data-bi="${i}">${w}</button>`).join('')}</div>${!S.fb&&a.length>0?`<button class="chkbtn" id="co">${UI.check}</button>`:''}`;}
function rMatch(e){const L2=e.pairs.map(p=>p[0]),R=e.pairs.map(p=>p[1]);return`<div class="q">${UI.match||'Match'}</div><div class="mwrap"><div class="mcol">${L2.map(w=>{const dn=S.md.some(d=>d[0]===w);return`<button class="mbtn ${dn?'hit':S.ms===w?'sel':''}" data-ml="${w}">${w}</button>`;}).join('')}</div><div class="mcol">${R.map(w=>{const dn=S.md.some(d=>d[1]===w);return`<button class="mbtn ${dn?'hit':''}" data-mr="${w}">${w}</button>`;}).join('')}</div></div>`;}
function rComp(){const ac=S.tot>0?Math.round(S.sc/S.tot*100):100;return`<div class="card comp"><span class="troph">🏆</span><div class="ctit">${UI.lc}</div><div class="stats"><div class="stat"><div class="sv">+${S.xp}</div><div class="sl">${UI.xp}</div></div><div class="stat"><div class="sv">${ac}%</div><div class="sl">${UI.acc2}</div></div><div class="stat"><div class="sv">${S.lives}</div><div class="sl">❤️ ${UI.lives}</div></div></div><button class="conbtn" id="hb">${UI.back||'←'}</button></div>`;}
 
// ═══════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════
function bind(){
 
  // HOME → mode selector
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    S.li=+b.dataset.li;
    if(b.dataset.mode==='ex'){
      S.ei=0;S.fb=null;S.wa=[];S.ms=null;S.md=[];S.sc=0;S.tot=0;
      S.screen='exercise';
    } else {
      S.screen='games';
    }
    render();
  }));
 
  // BACK buttons
  const bh=$('backHome');  if(bh)bh.addEventListener('click',()=>{S.screen='home';render();});
  const bh2=$('backHome2');if(bh2)bh2.addEventListener('click',()=>{S.screen='home';render();});
  const bg=$('backGames'); if(bg)bg.addEventListener('click',()=>{S.screen='games';render();});
 
  // GAMES MENU
  const gw=$('goWS');   if(gw)gw.addEventListener('click',()=>{S.wsFound=[];S.wsSelecting=[];S.screen='wordsearch';render();});
  const gd=$('goDiff'); if(gd)gd.addEventListener('click',()=>{S.diffsFound=[];S.diffClicks=[];S.screen='differences';render();});
 
  // ── WORD SEARCH ──
  // Drag/click per seleccionar paraules
  let wsMouseDown=false, wsStart=null;
  document.querySelectorAll('.ws-cell').forEach(cell=>{
    cell.addEventListener('mousedown',e=>{
      wsMouseDown=true;
      wsStart={r:+cell.dataset.r,c:+cell.dataset.c};
      S.wsSelecting=[wsStart];render();
    });
    cell.addEventListener('mousemove',()=>{
      if(!wsMouseDown||!wsStart)return;
      const r=+cell.dataset.r,c=+cell.dataset.c;
      // Calcula la línia entre start i current
      S.wsSelecting=getCellsInLine(wsStart,{r,c});render();
    });
    cell.addEventListener('mouseup',()=>{
      wsMouseDown=false;checkWordSelection();wsStart=null;
    });
    // Touch
    cell.addEventListener('touchstart',e=>{
      e.preventDefault();wsMouseDown=true;
      wsStart={r:+cell.dataset.r,c:+cell.dataset.c};
      S.wsSelecting=[wsStart];render();
    },{passive:false});
    cell.addEventListener('touchmove',e=>{
      e.preventDefault();
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      if(el&&el.classList.contains('ws-cell')){
        S.wsSelecting=getCellsInLine(wsStart,{r:+el.dataset.r,c:+el.dataset.c});render();
      }
    },{passive:false});
    cell.addEventListener('touchend',()=>{wsMouseDown=false;checkWordSelection();wsStart=null;});
  });
  document.addEventListener('mouseup',()=>{if(wsMouseDown){wsMouseDown=false;checkWordSelection();wsStart=null;}});
 
  const wsR=$('wsReset');if(wsR)wsR.addEventListener('click',()=>{S.wsFound=[];S.wsSelecting=[];render();});
 
  // ── 7 DIFERÈNCIES ──
  ['imgA','imgB'].forEach(id=>{
    const wrap=$(id);
    if(!wrap)return;
    wrap.addEventListener('click',e=>{
      const rect=wrap.getBoundingClientRect();
      const svgEl=wrap.querySelector('svg');
      if(!svgEl)return;
      const svgRect=svgEl.getBoundingClientRect();
      // Converteix a coordenades del viewBox (0-400, 0-300)
      const px=(e.clientX-svgRect.left)/svgRect.width*400;
      const py=(e.clientY-svgRect.top)/svgRect.height*300;
      checkDifference(px,py,id);
    });
  });
  const dr=$('diffReset');if(dr)dr.addEventListener('click',()=>{S.diffsFound=[];S.diffClicks=[];render();});
 
  // ── EXERCISES ──
  const lb=$('lb');if(lb)lb.addEventListener('click',()=>speak(E().word,'ca-ES'));
  document.querySelectorAll('[data-oi]').forEach(b=>b.addEventListener('click',()=>{
    if(S.fb)return;const e=E(),c=+b.dataset.oi;S.tot++;
    if(c===e.correct){S.fb={ok:true,chosen:c};S.sc++;S.xp+=10;}
    else{S.fb={ok:false,chosen:c,ans:e.options[e.correct]};S.lives=Math.max(0,S.lives-1);}
    render();
  }));
  document.querySelectorAll('[data-fw]').forEach(b=>b.addEventListener('click',()=>{
    if(S.fb)return;const e=E(),w=b.dataset.fw;S.tot++;
    if(w===e.blank){S.fb={ok:true,chosen:w};S.sc++;S.xp+=10;}
    else{S.fb={ok:false,chosen:w,ans:e.blank};S.lives=Math.max(0,S.lives-1);}
    render();
  }));
  document.querySelectorAll('[data-bi]').forEach(b=>b.addEventListener('click',()=>{
    if(S.fb)return;const w=b.textContent;if(!S.wa.includes(w)){S.wa=[...S.wa,w];render();}
  }));
  document.querySelectorAll('[data-di]').forEach(b=>b.addEventListener('click',()=>{
    if(S.fb)return;S.wa=S.wa.filter((_,i)=>i!==+b.dataset.di);render();
  }));
  const co=$('co');if(co)co.addEventListener('click',()=>{
    const e=E();S.tot++;
    if(S.wa.join(' ')===e.cat){S.fb={ok:true,ans:e.cat};S.sc++;S.xp+=15;}
    else{S.fb={ok:false,ans:e.cat};S.lives=Math.max(0,S.lives-1);}
    render();
  });
  document.querySelectorAll('[data-ml]').forEach(b=>b.addEventListener('click',()=>{
    if(S.md.some(d=>d[0]===b.dataset.ml))return;S.ms=b.dataset.ml;render();
  }));
  document.querySelectorAll('[data-mr]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.ms||S.md.some(d=>d[1]===b.dataset.mr))return;
    const e=E(),p=e.pairs.find(p=>p[0]===S.ms);
    if(p&&p[1]===b.dataset.mr){
      S.md=[...S.md,[S.ms,b.dataset.mr]];S.xp+=5;
      if(S.md.length===e.pairs.length){S.fb={ok:true,ans:''};S.sc++;S.tot++;}
    }else{S.lives=Math.max(0,S.lives-1);b.classList.add('miss');setTimeout(()=>b.classList.remove('miss'),400);}
    S.ms=null;render();
  }));
  const cb=$('cb');if(cb)cb.addEventListener('click',()=>{
    S.fb=null;S.wa=[];S.ms=null;S.md=[];
    if(S.ei<L().exercises.length-1)S.ei++;
    else{S.done.add(S.li);S.screen='complete';}
    render();
  });
  const hb=$('hb');if(hb)hb.addEventListener('click',()=>{S.screen='home';render();});
}
 
// ═══════════════════════════════════════
// WORD SEARCH LOGIC
// ═══════════════════════════════════════
function getCellsInLine(start,end){
  if(!start||!end)return[];
  const dr=end.r-start.r, dc=end.c-start.c;
  const len=Math.max(Math.abs(dr),Math.abs(dc));
  if(len===0)return[start];
  const sr=dr===0?0:dr/Math.abs(dr), sc=dc===0?0:dc/Math.abs(dc);
  // Permet 8 direccions
  if(Math.abs(dr)!==Math.abs(dc)&&dr!==0&&dc!==0){
    // No diagonal pura - agafa la direcció dominant
    if(Math.abs(dr)>Math.abs(dc))return getCellsInLine(start,{r:end.r,c:start.c});
    else return getCellsInLine(start,{r:start.r,c:end.c});
  }
  const cells=[];
  for(let i=0;i<=len;i++)cells.push({r:start.r+sr*i,c:start.c+sc*i});
  return cells;
}
 
function checkWordSelection(){
  const sel=S.wsSelecting;
  if(sel.length<2){S.wsSelecting=[];render();return;}
  const selWord=sel.map(c=>GDL().wordsearch.grid[c.r][c.c]).join('');
  const ws=GDL().wordsearch;
  let matched=null;
  ws.placements.forEach(p=>{
    if(p.word===selWord&&!S.wsFound.includes(p.word))matched=p.word;
    // Prova a l'inrevés
    if(p.word===selWord.split('').reverse().join('')&&!S.wsFound.includes(p.word))matched=p.word;
  });
  if(matched){
    S.wsFound=[...S.wsFound,matched];
    S.xp+=5;
    if(S.wsFound.length>=ws.words.length)S.xp+=20;
  }
  S.wsSelecting=[];render();
}
 
// ═══════════════════════════════════════
// DIFFERENCES LOGIC
// ═══════════════════════════════════════
function checkDifference(px,py,imgId){
  const df=GDL().differences;
  // Només comprova a la imatge B
  if(imgId!=='imgB')return;
  let found=false;
  df.diffs.forEach((d,i)=>{
    if(S.diffsFound.includes(i))return;
    const dist=Math.sqrt((px-d.x)**2+(py-d.y)**2);
    if(dist<=d.r){
      S.diffsFound=[...S.diffsFound,i];
      S.xp+=10;
      found=true;
      // Animació visual
      showDiffIndicator(imgId,px,py,true);
      if(S.diffsFound.length>=7)S.xp+=30;
    }
  });
  if(!found)showDiffIndicator(imgId,px,py,false);
  render();
}
 
function showDiffIndicator(imgId,px,py,ok){
  // Renderitzem primer, després afegim el flash
  setTimeout(()=>{
    const wrap=$(imgId);if(!wrap)return;
    const svgEl=wrap.querySelector('svg');if(!svgEl)return;
    const svgRect=svgEl.getBoundingClientRect();
    const div=document.createElement('div');
    div.className='diff-click-indicator';
    div.style.cssText=`left:${px/400*svgRect.width+svgRect.left-wrap.getBoundingClientRect().left-20}px;top:${py/300*svgRect.height+svgRect.top-wrap.getBoundingClientRect().top-20}px;width:40px;height:40px;border-color:${ok?'#58cc02':'#ff4b4b'}`;
    wrap.appendChild(div);
    setTimeout(()=>div.remove(),700);
  },50);
}
 
render();
</script>
